<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keshav Golsar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow"></div>

  <p class="top-note">I just don't want to hurt you — if ever I have, I'm sorry, from the bottom of my heart.</p>

  <header class="hero">
    <div class="avatar">KG</div>
    <h1>Keshav Golsar</h1>
    <p class="subtitle">Engineer &middot; Builder &middot; Tinkerer</p>
    <div class="socials">
      <button class="pill" data-soon>Email</button>
      <button class="pill" data-soon>LinkedIn</button>
      <button class="pill" data-soon>GitHub</button>
    </div>
  </header>

  <nav class="cards">
    <button class="card" data-soon>
      <span class="card-icon">&#128100;</span>
      <span class="card-title">About</span>
      <span class="card-desc">Who I am</span>
    </button>
    <button class="card" data-soon>
      <span class="card-icon">&#9889;</span>
      <span class="card-title">Skills</span>
      <span class="card-desc">What I know</span>
    </button>
    <button class="card" data-soon>
      <span class="card-icon">&#128193;</span>
      <span class="card-title">Projects</span>
      <span class="card-desc">What I've built</span>
    </button>
    <button class="card" data-soon>
      <span class="card-icon">&#9993;</span>
      <span class="card-title">Contact</span>
      <span class="card-desc">Get in touch</span>
    </button>
  </nav>

  <footer>
    <p>&copy; <span id="year"></span> Keshav Golsar</p>
  </footer>

  <div class="toast" id="toast">🚧 To be updated soon!</div>

<script src="script.js"></script>
</body>
</html>
